name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # ── Always rolling through "yesterday in KST" ─────────────────────────────
    # Primary build:  02:30 UTC  = 11:30 KST  (GA4 daily aggregates settled)
    # Safety rebuild: 09:30 UTC  = 18:30 KST  (recovers from any earlier failure)
    - cron: "30 2 * * *"
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "Start date (YYYY-MM-DD). Leave blank for 90-day window."
        required: false
      until:
        description: "End date (YYYY-MM-DD). Leave blank to use yesterday (KST)."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard data
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ secrets.META_API_VERSION }}
          INPUT_SINCE: ${{ github.event.inputs.since }}
          INPUT_UNTIL: ${{ github.event.inputs.until }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ] || [ -z "$FACEBOOK_ACCESS_TOKEN" ] || [ -z "$AD_ACCOUNT_ID" ]; then
            echo "Dashboard data secrets are not configured. Deploying UI without dashboard.json."
            exit 0
          fi
          python -m pip install -r requirements.txt
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/ga4-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/ga4-service-account.json"

          # The build script defaults to D-1 KST when --since/--until omitted, but
          # we pass explicit values so workflow_dispatch overrides work cleanly.
          SINCE="${INPUT_SINCE:-$(TZ=Asia/Seoul date -d '90 days ago' +%F)}"
          UNTIL="${INPUT_UNTIL:-$(TZ=Asia/Seoul date -d 'yesterday' +%F)}"
          echo "Building window: $SINCE → $UNTIL (KST)"
          python scripts/build_dashboard_data.py \
            --since "$SINCE" \
            --until "$UNTIL" \
            --output public/data/dashboard.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
